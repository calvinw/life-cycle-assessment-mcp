services:
  gdt-server:
    image: gdt-server:latest
    volumes:
      - ~/olca-data:/app/data
    command: -db lca_methods
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  lca-mcp:
    build: .
    ports:
      - "9000:9000"
    depends_on:
      gdt-server:
        condition: service_healthy
    environment:
      - GDT_SERVER_URL=http://gdt-server:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/.well-known/oauth-authorization-server"]
      interval: 10s
      timeout: 5s
      retries: 5
