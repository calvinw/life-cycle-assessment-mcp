services:
  gdt-server:
    image: gdt-server:latest
    pull_policy: never
    volumes:
      - ${HOME}/olca-data:/app/data
    command: -db lca_methods
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  lca-mcp:
    build: .
    ports:
      - "9000:9000"
    depends_on:
      gdt-server:
        condition: service_healthy
    environment:
      - GDT_SERVER_URL=http://gdt-server:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/.well-known/oauth-authorization-server"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lca-mcp.rule=Host(`lca-mcp.mathplosion.com`)"
      - "traefik.http.routers.lca-mcp.entrypoints=https"
      - "traefik.http.routers.lca-mcp.tls=true"
      - "traefik.http.routers.lca-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.lca-mcp.loadbalancer.server.port=9000"
      - "traefik.http.routers.lca-mcp.middlewares=lca-mcp-headers"
      - "traefik.http.middlewares.lca-mcp-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
