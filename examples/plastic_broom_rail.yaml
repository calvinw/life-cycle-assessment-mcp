name: Plastic Broom — rail freight scenario
goal: >
  Compare the baseline plastic broom with a foreground-only modal-shift
  scenario. The explicit freight demand uses RER rail freight instead of the
  BAfU lorry fleet average. The BAfU background database is not modified.

functional_unit:
  description: 1 plastic broom
  amount: 1.0
  unit: unit

products:
  - { name: Plastic broom, unit: unit }

processes:
  - name: Plastic broom assembly
    reference_output: { flow: Plastic broom, amount: 1.0, unit: unit }
    inputs:
      - { flow: "Polylactide, granulate, at plant", location: GLO, database: bafu, amount: 0.52, unit: kg }
      - { flow: "Nylon 6, at plant", location: RER, database: bafu, amount: 0.03, unit: kg }
      - { flow: "Transport, freight, rail", location: RER, database: bafu, amount: 0.1055, unit: tkm }

reference_process: "Plastic broom assembly"

lcia:
  method_name: "EF v3.1"
