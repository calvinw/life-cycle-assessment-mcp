name: Plastic Broom — NatureWorks Nebraska PLA sensitivity
goal: >
  Compare the baseline plastic broom with a foreground-only substitution of
  the complete PLA activity. This uses a BAfU activity whose name begins with
  "xxx" and must therefore be treated as a legacy or inactive-dataset
  sensitivity, not as the recommended baseline. The BAfU database is not
  modified.

functional_unit:
  description: 1 plastic broom
  amount: 1.0
  unit: unit

products:
  - { name: Plastic broom, unit: unit }

processes:
  - name: Plastic broom assembly
    reference_output: { flow: Plastic broom, amount: 1.0, unit: unit }
    inputs:
      - { flow: "xxx Polylactide, granulate, NatureWorks Nebraska", location: US, database: bafu, amount: 0.52, unit: kg }
      - { flow: "Nylon 6, at plant", location: RER, database: bafu, amount: 0.03, unit: kg }
      - { flow: "Transport, freight, lorry, 16t-32t gross weight, fleet average", location: RER, database: bafu, amount: 0.1055, unit: tkm }

reference_process: "Plastic broom assembly"

lcia:
  method_name: "EF v3.1"
