name: Plastic Broom — EURO VI freight scenario
goal: >
  Compare the baseline plastic broom with a foreground-only freight scenario.
  The explicit freight demand uses a 32t diesel lorry meeting EURO VI instead
  of the BAfU fleet average. The BAfU background database is not modified.

functional_unit:
  description: 1 plastic broom
  amount: 1.0
  unit: unit

products:
  - { name: Plastic broom, unit: unit }

processes:
  - name: Plastic broom assembly
    reference_output: { flow: Plastic broom, amount: 1.0, unit: unit }
    inputs:
      - { flow: "Polylactide, granulate, at plant", location: GLO, database: bafu, amount: 0.52, unit: kg }
      - { flow: "Nylon 6, at plant", location: RER, database: bafu, amount: 0.03, unit: kg }
      - { flow: "Transport, freight, lorry, diesel, 32t gross weight, 2020, EURO-VI, long haul", location: RER, database: bafu, amount: 0.1055, unit: tkm }

reference_process: "Plastic broom assembly"

lcia:
  method_name: "EF v3.1"
